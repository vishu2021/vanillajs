<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Color Picker</title>
    <!-- Font Awesome Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css"
    />
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins&display=swap"
      rel="stylesheet"
    />
    <!-- Stylesheet -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="wrapper">
      <div class="image-container">
        <img id="image" src="demo-image-3.jpg" />
      </div>
      <div class="btns-container">
        <input type="file" id="file" accesskey="image/*" />
        <label for="file">Open A Photo</label>
        <button id="pick-color">Pick Color</button>
      </div>
      <div id="error" class="hide"></div>
      <div id="result" class="hide">
        <div>
          <input type="text" id="hex-val-ref" />
          <button onclick="copy('hex-val-ref')">
            <i class="fa-regular fa-copy"></i>
          </button>
        </div>
        <div>
          <input type="text" id="rgb-val-ref" />
          <button onclick="copy('rgb-val-ref')">
            <i class="fa-regular fa-copy"></i>
          </button>
        </div>
        <div id="picked-color-ref"></div>
      </div>
      <div id="custom-alert">Color Code Copied!</div>
    </div>
    <div class="footer" style=" 
position: absolute; 
padding: 10px;
z-index: 9;
bottom: 0; 
right: 0; "
>
<a href="https://www.youtube.com/watch?v=dFIohHWIApw " target="_blank" class="youtube-tutorial-btn" 
style="
  font-size: 1.12em;
  background-color: rgba(0, 0, 0, 0.6);
  color: #fff;
  border: none; 
  border-radius: 100px;
  padding:20px 40px;
  cursor: pointer;
  outline: none;
  font-weight: 600;
  display: inline-block;
  text-decoration: none;
  transition: 1s all ease;
  border: 4px solid #fff;"
  > 
  Youtube Tutorial
</a>
</div>
    <!-- Script -->
    <script src="script.js"></script>
  </body>
</html>
