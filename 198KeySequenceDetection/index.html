<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Key Detection</title> 
    <link rel="icon" href="https://fav.farm/✅" />
    <style>
          p {
      background-color: rgba(0, 0, 0);
      left: 50%;
      top: 10px;
      font-weight: 600;
      font-size: 20px;
      padding: 10px 30px;
      border-radius: 2px;
      color: #fff;
      position: absolute;
      transform: translateX(-50%);
      pointer-events: none;
    }
    </style>
  </head>
  <body>
    <p>
      Open Dev Tools and See Console Log (CTRL+SHIFT+I)
    </p>
    <script>
      const pressed = [];
      const secretCode = "wesbos";

      window.addEventListener("keyup", (e) => {
        console.log(e.key);
        pressed.push(e.key);
        pressed.splice(
          -secretCode.length - 1,
          pressed.length - secretCode.length
        );
        if (pressed.join("").includes(secretCode)) {
          console.log("DING DING!");
          cornify_add();
        }
        console.log(pressed);
      });
    </script>
  </body>
</html>
