<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Character Count</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500&display=swap" rel="stylesheet">
    <!-- Stylesheet -->
     <style>
        *{
    padding: 0;
    margin: 0;
    box-sizing: border-box;
    font-family: "Poppins",sans-serif;
}
body{
    background-color: #0a192f;
}
.container{
    width: 400px;
    position: absolute;
    transform: translate(-50%,-50%);
    top: 50%;
    left: 50%;
}
textarea{
    width: 100%;
    resize: none;
    background-color: #172a46;
    border: none;
    font-size: 16px;
    line-height: 30px;
    padding: 15px;
    border-radius: 3px;
    color: #a8b2d1;
    outline: none;
}
p{
    color: #e5e5e5;
    text-align: right;
    margin-top: 20px;
}
     </style>
</head>
<body>
    <div class="container">
        <textarea id="my-text" rows="8" placeholder="Type something here..."></textarea>
        <p id="count-result">Total characters: 0</p>
    </div>
    <div class="footer" style=" 
position: absolute; 
padding: 10px;
z-index: 9;
bottom: 0; 
right: 0; "
>
<a href="https://www.youtube.com/watch?v=b7cmqMy5oEk " target="_blank" class="youtube-tutorial-btn" 
style="
  font-size: 1.12em;
  background-color: rgba(0, 0, 0, 0.6);
  color: #fff;
  border: none; 
  border-radius: 100px;
  padding:20px 40px;
  cursor: pointer;
  outline: none;
  font-weight: 600;
  display: inline-block;
  text-decoration: none;
  transition: 1s all ease;
  border: 4px solid #fff;"
  > 
  Youtube Tutorial
</a>
</div>
    <!--Script-->
    <script >

let myText = document.getElementById("my-text");
myText.addEventListener("input", () => {
    let count = (myText.value).length;
    document.getElementById("count-result").textContent = `Total characters: ${count}`;
});
    </script>
</body>
</html>
