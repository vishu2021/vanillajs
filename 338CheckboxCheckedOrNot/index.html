<!DOCTYPE html>
<html lang="en">
<head>
    <title>Check if checkbox is checked</title>
    <!--Google Font-->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500&display=swap" rel="stylesheet">
    <!--Stylesheet-->
   <style>
    body{
    padding: 0;
    margin: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: "Poppins",sans-serif;
}
input {
    width: 80px;
    height: 80px;
    cursor: pointer;
}
p {
    font-size: 40px;
    font-weight: 600;
}
   </style>
</head>
<body>
    <input type="checkbox" id="my-checkbox" onclick="isChecked()">
    <p id="message">Not Checked</p>
     
    <!--Script-->
    <script  >
        function isChecked(){
    if(document.getElementById("my-checkbox").checked){
        document.getElementById("message").textContent = "Checked";
    }
    else{
        document.getElementById("message").textContent = "Not Checked";
    }
}
    </script>
</body>
</html>
