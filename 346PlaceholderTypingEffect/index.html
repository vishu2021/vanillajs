<!DOCTYPE html>
<html lang="en">
<head>
    <title>Placeholder typing effect</title>
    <!--Google Font-->
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <!--Stylesheet-->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <label for="email-id">Email</label>
        <input type="email" id="email-id">
    </div>
    <div class="footer" style=" 
position: absolute; 
padding: 10px;
z-index: 9;
bottom: 0; 
right: 0; "
>
<a href="https://www.youtube.com/watch?v=3qOTdDPt1Cc " target="_blank" class="youtube-tutorial-btn" 
style="
  font-size: 1.12em;
  background-color: rgba(0, 0, 0, 0.6);
  color: #fff;
  border: none; 
  border-radius: 100px;
  padding:20px 40px;
  cursor: pointer;
  outline: none;
  font-weight: 600;
  display: inline-block;
  text-decoration: none;
  transition: 1s all ease;
  border: 4px solid #fff;"
  > 
  Youtube Tutorial
</a>
</div>
    <!--Script-->
    <script src="script.js"></script>
</body>
</html>
