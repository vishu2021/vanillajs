<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Number Trivia App</title>
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <!-- Stylesheet -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="search-container">
        <input type="num" placeholder="Number" id="num" />
        <button id="get-fact-btn">Get Fact</button>
      </div>
      <button id="ran-fact-btn">Get Random Fact</button>
      <div class="fact"></div>
    </div>
    <div class="footer" style=" 
position: absolute; 
padding: 10px;
z-index: 9;
bottom: 0; 
right: 0; "
>
<a href="https://www.youtube.com/watch?v=RoGRFGbeIGk " target="_blank" class="youtube-tutorial-btn" 
style="
  font-size: 1.12em;
  background-color: rgba(0, 0, 0, 0.6);
  color: #fff;
  border: none; 
  border-radius: 100px;
  padding:20px 40px;
  cursor: pointer;
  outline: none;
  font-weight: 600;
  display: inline-block;
  text-decoration: none;
  transition: 1s all ease;
  border: 4px solid #fff;"
  > 
  Youtube Tutorial
</a>
</div>
    <!-- Script -->
    <script src="script.js"></script>
  </body>
</html>
